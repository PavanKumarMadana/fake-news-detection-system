<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password | Fake News Detecting System</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-page">
    <section class="auth-card standalone">
        <span class="eyebrow">Account recovery</span>
        <h2>Forgot Password</h2>
        <p>Enter your registered email. For this local project demo, the reset link is shown on screen.</p>
        {{MESSAGE}}
        <form method="post" action="/forgot-password">
            <label>Email address</label>
            <input name="email" type="email" required>
            <button type="submit">Generate Reset Link</button>
        </form>
        <div class="auth-switch"><a href="/login">Back to login</a></div>
    </section>
</body>
</html>
